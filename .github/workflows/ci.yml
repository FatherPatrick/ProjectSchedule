name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Required by Prisma client generation and any imports of env vars at build time.
      DATABASE_URL: "file:./ci.db"
      NEXTAUTH_SECRET: "ci-placeholder-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_SECRET: "ci-placeholder-secret"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
